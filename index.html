<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Bầu Cử Bình Hưng 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-hover:hover { transform: translateY(-5px); transition: 0.3s ease; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
        #lightbox-img { transition: transform 0.1s ease-out; max-width: 90%; max-height: 90%; cursor: grab; border: 2px solid white; border-radius: 4px; }
        .zoom-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 1001; }
        .btn-zoom { background: white; width: 50px; height: 50px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="lightbox">
        <button onclick="closeLightbox()" class="fixed top-6 right-6 text-5xl text-white/50 hover:text-white z-[1002]">×</button>
        <div id="lightbox-container" onmousedown="startPan(event)" onmousemove="doPan(event)" onmouseup="endPan()" onmouseleave="endPan()" onwheel="handleWheel(event)">
            <img id="lightbox-img" src="" alt="Zoom" draggable="false">
        </div>
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(-0.5)"><i class="fas fa-minus"></i></button>
            <button class="btn-zoom" onclick="resetZoom()"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-zoom" onclick="changeZoom(0.5)"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <header class="bg-gradient-to-r from-red-700 via-red-600 to-red-700 text-white shadow-2xl py-8">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-6 relative z-10 text-center">
            <img src="quoc_huy.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Emblem_of_Vietnam.svg/120px-Emblem_of_Vietnam.svg.png'" class="h-24 w-24 md:h-32 md:w-32 object-contain mx-auto md:mx-0 drop-shadow-lg">
            <div>
                <h1 class="text-2xl md:text-5xl font-black uppercase tracking-tighter leading-tight">BẦU CỬ QUỐC HỘI KHÓA XVI <br><span class="text-yellow-400">VÀ ĐẠI BIỂU HĐND CÁC CẤP</span></h1>
                <div class="h-1.5 w-40 bg-yellow-400 mx-auto my-4 rounded-full shadow-sm"></div>
                <p class="text-lg md:text-2xl font-bold italic uppercase tracking-widest" id="headerTitle">Đang tải...</p>
            </div>
            <img src="logo.png" onerror="this.src='https://via.placeholder.com/150?text=LOGO'" class="h-24 w-24 md:h-32 md:w-32 object-contain mx-auto md:mx-0 drop-shadow-lg">
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="mb-12 space-y-4 text-center">
            <div id="candidate-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            
            <div id="search-card-container" class="w-full"></div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-xl p-6 border border-slate-200 mb-12">
            <h2 class="text-xl font-bold mb-4 text-blue-900 uppercase flex items-center px-2"><i class="fas fa-video mr-3 text-red-600"></i> Video hướng dẫn bầu cử</h2>
            <div class="rounded-3xl overflow-hidden border bg-black shadow-inner">
                <video controls class="w-full h-auto max-h-[500px] shadow-lg"><source src="video.mp4" type="video/mp4"></video>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 mb-12">
            <div class="lg:col-span-5 bg-white rounded-[2.5rem] shadow-xl p-6 border border-slate-200 text-center">
                <h2 class="text-xl font-bold mb-4 text-blue-900 uppercase flex items-center px-2"><i class="fas fa-map mr-3 text-red-600"></i> Sơ đồ khu vực bỏ phiếu</h2>
                <div class="relative group cursor-zoom-in overflow-hidden rounded-3xl border h-[550px] bg-slate-100" onclick="openLightbox('ban_do.png')">
                    <img src="ban_do.png" class="w-full h-full object-contain p-2 transition duration-500 group-hover:scale-105">
                </div>
            </div>

            <div class="lg:col-span-7 bg-white rounded-[2.5rem] shadow-xl p-8 border border-slate-200 flex flex-col h-[630px]">
                <h2 class="text-xl font-bold mb-6 text-blue-900 uppercase flex items-center"><i class="fas fa-list-ol mr-3 text-red-600"></i> Danh sách 34 khu vực tra cứu</h2>
                <input type="text" id="search" onkeyup="doSearch()" placeholder="Tìm tên ấp hoặc địa điểm..." class="w-full pl-6 pr-6 py-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-600 mb-6 shadow-inner">
                <div class="overflow-y-auto flex-1 custom-scrollbar pr-2">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-white z-10 text-xs uppercase font-black text-slate-400 border-b shadow-sm">
                            <tr><th class="p-4">Khu vực</th><th class="p-4 text-center">Ấp</th><th class="p-4">Địa điểm bỏ phiếu</th><th class="p-4 text-right">Cử tri</th></tr>
                        </thead>
                        <tbody id="content" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let globalData = {};
        let scale = 1, translateX = 0, translateY = 0, isPanning = false, startX, startY;

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; resetZoom(); }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function applyTransform() { document.getElementById('lightbox-img').style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
        function changeZoom(amount) { scale = Math.min(Math.max(1, scale + amount), 6); if (scale === 1) { translateX = 0; translateY = 0; } applyTransform(); }
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; applyTransform(); }
        function handleWheel(e) { e.preventDefault(); changeZoom(e.deltaY < 0 ? 0.3 : -0.3); }
        function startPan(e) { if (scale <= 1) return; isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; }
        function doPan(e) { if (!isPanning) return; translateX = e.clientX - startX; translateY = e.clientY - startY; applyTransform(); }
        function endPan() { isPanning = false; }

        // HÀM MỞ LINK SANG TAB MỚI
        window.openInNewTab = function(id) {
            const f = globalData.cac_chuc_nang.find(x => x.id === id);
            if(f && f.link_target) {
                window.open(f.link_target, '_blank');
            }
        };

        async function init() {
            try {
                const res = await fetch('./data.json?v=' + Date.now());
                globalData = await res.json();
                document.getElementById('headerTitle').innerText = globalData.tieu_de_trang;
                
                // Render 3 thẻ hàng 1
                document.getElementById('candidate-cards').innerHTML = globalData.cac_chuc_nang.slice(0, 3).map(item => `
                    <div onclick="openInNewTab('${item.id}')" class="card-hover cursor-pointer bg-white p-4 rounded-2xl border flex items-center space-x-3 shadow-sm border-slate-200">
                        <div class="${item.mau} text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-lg shrink-0">
                            <i class="fas ${item.icon} text-lg"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-[10px] uppercase text-slate-700 leading-tight">${item.tieu_de}</h3>
                            <p class="text-[8px] text-slate-400 font-medium italic mt-1">Mở danh sách chi tiết (Tab mới)</p>
                        </div>
                    </div>`).join('');

                // Render thẻ tra cứu hàng 2
                const search = globalData.cac_chuc_nang[3];
                document.getElementById('search-card-container').innerHTML = `
                    <div onclick="openInNewTab('${search.id}')" class="card-hover cursor-pointer bg-white p-4 rounded-2xl border flex items-center space-x-4 shadow-sm border-slate-200 group">
                        <div class="${search.mau} text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg shrink-0 animate-pulse">
                            <i class="fas ${search.icon} text-xl"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-bold text-[10px] uppercase text-slate-700 leading-tight group-hover:text-orange-600 transition">${search.tieu_de}</h3>
                            <p class="text-[8px] text-orange-500 font-bold uppercase mt-1 tracking-wider italic">Hệ thống tra cứu dữ liệu cử tri chính thức (Mở Tab mới)</p>
                        </div>
                    </div>`;

                document.getElementById('content').innerHTML = globalData.danh_sach_khu_vuc.map(item => `
                    <tr class="hover:bg-blue-50 transition border-b">
                        <td class="p-5 font-black text-blue-900 text-xl text-center">${item.khu_vuc}</td>
                        <td class="p-5 text-sm font-bold text-slate-700 text-center">${item.ap}</td>
                        <td class="p-5 text-sm italic text-slate-500 text-center">
                            <a href="${item.map_link}" target="_blank" class="text-blue-600 font-bold hover:underline">
                                <i class="fas fa-directions mr-2 text-red-500 text-lg"></i> ${item.dia_diem}
                            </a>
                        </td>
                        <td class="p-5 text-right font-black text-red-600 text-lg">${item.so_luong}</td>
                    </tr>`).join('');
            } catch (err) { console.error(err); }
        }

        window.doSearch = function() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#content tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        };

        window.onload = init;
    </script>
</body>
</html>
