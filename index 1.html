<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra Cứu Bầu Cử Bình Hưng 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .card-hover:hover { transform: translateY(-8px); transition: 0.4s ease; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; align-items: center; justify-content: center; overflow: hidden; touch-action: none; }
        #lightbox-img { transition: transform 0.1s ease-out; max-width: 90%; max-height: 90%; cursor: grab; border: 3px solid white; border-radius: 8px; }
        .zoom-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1001; }
        .btn-zoom { background: white; width: 60px; height: 60px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); color: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed">

    <div id="lightbox">
        <button onclick="closeLightbox()" class="fixed top-8 right-8 text-6xl text-white/50 hover:text-white z-[1002]">×</button>
        <div id="lightbox-container" onmousedown="startPan(event)" onmousemove="doPan(event)" onmouseup="endPan()" onmouseleave="endPan()" onwheel="handleWheel(event)">
            <img id="lightbox-img" src="" alt="Zoom" draggable="false">
        </div>
        <div class="zoom-controls">
            <button class="btn-zoom" onclick="changeZoom(-0.5)"><i class="fas fa-minus"></i></button>
            <button class="btn-zoom" onclick="resetZoom()"><i class="fas fa-sync-alt"></i></button>
            <button class="btn-zoom" onclick="changeZoom(0.5)"><i class="fas fa-plus"></i></button>
        </div>
    </div>

    <header class="bg-gradient-to-r from-red-800 via-red-600 to-red-800 text-white shadow-2xl py-12">
        <div class="container mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-8 text-center relative z-10">
            <img src="quoc_huy.png" onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/a/a1/Emblem_of_Vietnam.svg/120px-Emblem_of_Vietnam.svg.png'" class="h-28 w-28 md:h-36 md:w-36 object-contain mx-auto md:mx-0 drop-shadow-2xl">
            <div>
                <h1 class="text-3xl md:text-6xl font-black uppercase tracking-tighter leading-tight drop-shadow-lg">BẦU CỬ ĐẠI BIỂU QUỐC HỘI KHÓA XVI <br><span class="text-yellow-400 text-2xl md:text-5xl">VÀ ĐẠI BIỂU HĐND CÁC CẤP NHIỆM KỲ 2026 - 2031</span></h1>
                <div class="h-2 w-64 bg-yellow-400 mx-auto my-6 rounded-full shadow-lg"></div>
                <p class="text-2xl md:text-3xl font-black italic uppercase tracking-widest text-white/90" id="headerTitle">Đang tải...</p>
            </div>
            <img src="logo.png" onerror="this.src='https://via.placeholder.com/150?text=LOGO'" class="h-28 w-28 md:h-36 md:w-36 object-contain mx-auto md:mx-0 drop-shadow-2xl">
        </div>
    </header>

    <main class="container mx-auto px-4 py-12">
        <div class="mb-16 space-y-10">
            <div id="candidate-cards" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
            
            <div id="search-card-container"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-5 bg-white rounded-[3rem] shadow-2xl p-8 border border-slate-100 text-center">
                <h2 class="text-3xl font-black mb-8 text-blue-900 uppercase flex items-center justify-center"><i class="fas fa-map-marked-alt mr-4 text-red-600"></i> Bản đồ phân bố các khu vực bầu cử</h2>
                <div class="relative group cursor-zoom-in overflow-hidden rounded-[2rem] border-2 border-slate-50 h-[600px] bg-slate-50 shadow-inner" onclick="openLightbox('ban_do.png')">
                    <img src="ban_do.png" class="w-full h-full object-contain p-4 transition duration-700 group-hover:scale-110">
                </div>
            </div>

            <div class="lg:col-span-7 bg-white rounded-[3rem] shadow-2xl p-10 border border-slate-100 flex flex-col h-[700px]">
                <h2 class="text-3xl font-black mb-8 text-blue-900 uppercase flex items-center"><i class="fas fa-list-ol mr-4 text-red-600"></i> Tra cứu thông tin 34 khu vực bỏ phiếu</h2>
                <input type="text" id="search" onkeyup="doSearch()" placeholder="Nhập tên ấp hoặc địa điểm để tìm nhanh..." class="w-full px-8 py-6 bg-slate-50 border-4 border-slate-50 rounded-[2rem] outline-none mb-10 shadow-inner text-xl font-bold">
                <div class="overflow-y-auto flex-1 custom-scrollbar pr-4">
                    <table class="w-full text-left border-collapse">
                        <thead class="sticky top-0 bg-white z-10 text-base uppercase font-black text-slate-400 border-b-4 border-slate-50">
                            <tr><th class="p-4">Khu vực</th><th class="p-4 text-center">Ấp</th><th class="p-4">Địa điểm bỏ phiếu</th><th class="p-4 text-right">Cử tri</th></tr>
                        </thead>
                        <tbody id="content" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let globalData = {};
        let scale = 1, translateX = 0, translateY = 0, isPanning = false, startX, startY;

        function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').style.display = 'flex'; resetZoom(); }
        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
        function applyTransform() { document.getElementById('lightbox-img').style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }
        function changeZoom(amount) { scale = Math.min(Math.max(1, scale + amount), 6); if (scale === 1) { translateX = 0; translateY = 0; } applyTransform(); }
        function resetZoom() { scale = 1; translateX = 0; translateY = 0; applyTransform(); }
        function handleWheel(e) { e.preventDefault(); changeZoom(e.deltaY < 0 ? 0.3 : -0.3); }
        function startPan(e) { if (scale <= 1) return; isPanning = true; startX = e.clientX - translateX; startY = e.clientY - translateY; }
        function doPan(e) { if (!isPanning) return; translateX = e.clientX - startX; translateY = e.clientY - startY; applyTransform(); }
        function endPan() { isPanning = false; }

        window.openLink = function(id) {
            const f = globalData.cac_chuc_nang.find(x => x.id === id);
            if(f && f.link_target) { window.open(f.link_target, '_blank'); }
        };

        async function init() {
            try {
                const res = await fetch('./data.json?v=' + Date.now());
                globalData = await res.json();
                document.getElementById('headerTitle').innerText = globalData.tieu_de_trang;
                
                // Hàng 1: 3 Thẻ ứng cử viên
                document.getElementById('candidate-cards').innerHTML = globalData.cac_chuc_nang.slice(0, 3).map(item => `
                    <div onclick="openLink('${item.id}')" class="card-hover cursor-pointer bg-white p-8 rounded-[2.5rem] border-4 border-white flex items-center space-x-6 shadow-xl h-full group">
                        <div class="${item.mau} text-white w-20 h-20 rounded-3xl flex items-center justify-center shadow-2xl shrink-0 group-hover:scale-110 transition">
                            <i class="fas ${item.icon} text-4xl"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-black text-xl md:text-2xl uppercase text-slate-800 leading-tight">${item.tieu_de}</h3>
                            <p class="text-xs text-slate-400 font-black uppercase mt-3 tracking-widest italic">Nhấn để xem chi tiết</p>
                        </div>
                    </div>`).join('');

                // Hàng 2: Thẻ Tra cứu cử tri (Cực lớn)
                const search = globalData.cac_chuc_nang[3];
                document.getElementById('search-card-container').innerHTML = `
                    <div onclick="openLink('${search.id}')" class="card-hover cursor-pointer bg-white p-10 rounded-[3rem] border-4 border-orange-50 flex items-center space-x-8 shadow-2xl group w-full">
                        <div class="${search.mau} text-white w-24 h-24 rounded-[2rem] flex items-center justify-center shadow-2xl shrink-0 animate-bounce">
                            <i class="fas ${search.icon} text-5xl"></i>
                        </div>
                        <div class="text-left">
                            <h3 class="font-black text-xl md:text-3xl uppercase text-slate-900 leading-tight group-hover:text-orange-600 transition-colors">${search.tieu_de}</h3>
                            <p class="text-sm text-orange-600 font-black uppercase mt-4 tracking-[0.3em] italic">Hệ thống tra cứu dữ liệu cử tri chính thức (Mở Tab mới)</p>
                        </div>
                    </div>`;

                document.getElementById('content').innerHTML = globalData.danh_sach_khu_vuc.map(item => `
                    <tr class="hover:bg-blue-50/50 transition border-b border-slate-50">
                        <td class="p-8 font-black text-blue-900 text-4xl text-center">${item.khu_vuc}</td>
                        <td class="p-8 text-xl font-black text-slate-700 text-center">${item.ap}</td>
                        <td class="p-8 text-lg italic text-slate-500 text-center">
                            <a href="${item.map_link}" target="_blank" class="text-blue-700 font-black hover:underline flex items-center justify-center gap-4">
                                <i class="fas fa-directions text-red-600 text-3xl"></i> ${item.dia_diem}
                            </a>
                        </td>
                        <td class="p-8 text-right font-black text-red-600 text-3xl">${item.so_luong}</td>
                    </tr>`).join('');
            } catch (err) { console.error(err); }
        }
        window.doSearch = function() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('#content tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(q) ? '' : 'none');
        };
        window.onload = init;
    </script>
</body>
</html>
